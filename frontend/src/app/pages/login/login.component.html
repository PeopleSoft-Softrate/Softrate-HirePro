<div class="login-page">
  <div class="login-split">
    <!-- Left Panel with Image -->
  <div class="login-left">
    <img src="/assets/landing%20page/login-page.svg" alt="Login Illustration" class="login-illustration" />
  </div>

  <!-- Right Panel -->
  <div class="login-right">
    <div class="mobile-header brand-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
        </svg>
      </div>
      <span class="brand-name">Softrate Hire Pro</span>
    </div>

    <div class="login-card-wrapper">
      <div class="card-header">
        <h2>Assessment Login</h2>
        <p>Sign in to access your secure online exam</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group" [class.has-error]="error">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="name@company.com" required />
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="••••••••••••" required />
            <button type="button" class="toggle-pass" (click)="showPassword = !showPassword" tabindex="-1">
              <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember this device</label>
        </div>

        <div class="error-msg" *ngIf="error">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>

        <button type="submit" class="btn-login" [disabled]="loading">
          <span *ngIf="!loading" style="display: flex; align-items: center; justify-content: center; gap: 8px;">Sign In <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
          <span *ngIf="loading" class="spinner-sm"></span>
        </button>
      </form>


      <div class="trusted-badge">
        <span>TRUSTED BY ACADEMIC PARTNERS</span>
        <div class="trusted-logos">
          <img src="/assets/landing%20page/accadamic_partner/blue-vit-logo.png" alt="VIT">
          <img src="/assets/landing%20page/accadamic_partner/chennai-cit-logo.png" alt="CIT">
          <img src="/assets/landing%20page/accadamic_partner/miranda-logo.svg" alt="Miranda House">
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- Login Footer -->
  <app-footer class="login-footer"></app-footer>
</div>
