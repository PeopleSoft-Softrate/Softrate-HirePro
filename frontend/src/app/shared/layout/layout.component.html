<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="!sidebarOpen">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="white" fill-opacity="0.15"/>
            <path d="M8 22L14 10L20 18L24 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="24" cy="13" r="2" fill="white"/>
          </svg>
        </div>
        <span class="brand-text" *ngIf="sidebarOpen">Hire Pro</span>
      </div>
      <button class="toggle-btn" (click)="sidebarOpen = !sidebarOpen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Role Badge -->
    <div class="role-badge" *ngIf="sidebarOpen">
      <span class="badge-pill" [class.admin]="isAdmin">{{ isAdmin ? 'Admin' : 'Student' }}</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.path"
         routerLinkActive="active"
         class="nav-item"
         [title]="link.label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" [innerHTML]="getIcon(link.icon)"></svg>
        <span class="nav-label" *ngIf="sidebarOpen">{{ link.label }}</span>
      </a>
    </nav>

    <!-- User info at bottom -->
    <div class="sidebar-footer" *ngIf="sidebarOpen">
      <div class="user-info">
        <div class="user-avatar">{{ (user?.name || 'U')[0].toUpperCase() }}</div>
        <div class="user-details">
          <div class="user-name">{{ user?.name }}</div>
          <div class="user-email">{{ user?.email }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>

    <button class="logout-icon-btn" *ngIf="!sidebarOpen" (click)="logout()" title="Sign out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
